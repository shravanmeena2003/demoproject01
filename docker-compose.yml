version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: smart-leads-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smart-leads

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smart-leads-api
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/smart-leads
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: smart-leads-web
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - server

volumes:
  mongo_data:
